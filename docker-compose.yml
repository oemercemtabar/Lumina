version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina
      POSTGRES_DB: lumina
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: infra/docker/recon-api.Dockerfile
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: infra/docker/director-web.Dockerfile
    env_file:
      - .env.example
    ports:
      - "5173:5173"
    depends_on:
      - api
